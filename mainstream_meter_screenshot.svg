<svg xmlns="http://www.w3.org/2000/svg" width="420" height="320" viewBox="0 0 420 320">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&amp;display=swap');
    text { font-family: 'VT323', monospace; }
  </style>

  <!-- Card background -->
  <rect x="14" y="14" width="392" height="292" fill="#1f2937"/>
  <rect x="10" y="10" width="392" height="292" fill="white" stroke="#1f2937" stroke-width="2"/>

  <!-- Title -->
  <text x="206" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#1f2937" font-family="monospace">MAINSTREAM METER</text>

  <!-- Gauge - semicircle using arcs -->
  <g transform="translate(210, 200)">
    <!-- Niche segment (cyan): 0-40% of arc = -90deg to -18deg -->
    <path d="M -120,0 A 120,120 0 0,1 -103.73,-60.31" fill="none" stroke="#67e8f9" stroke-width="40"/>
    <!-- Continuation of niche -->
    <path d="M -103.73,-60.31 A 120,120 0 0,1 -37.08,-114.12" fill="none" stroke="#67e8f9" stroke-width="40"/>

    <!-- Normal segment (green): 40-70% of arc = -18deg to 36deg -->
    <path d="M -37.08,-114.12 A 120,120 0 0,1 58.47,-101.79" fill="none" stroke="#86efac" stroke-width="40"/>

    <!-- Mainstream segment (red): 70-100% of arc = 36deg to 90deg -->
    <path d="M 58.47,-101.79 A 120,120 0 0,1 120,0" fill="none" stroke="#ff5c5c" stroke-width="40"/>

    <!-- Outer border arc -->
    <path d="M -140,0 A 140,140 0 0,1 140,0" fill="none" stroke="#1f2937" stroke-width="2"/>
    <!-- Inner border arc -->
    <path d="M -100,0 A 100,100 0 0,1 100,0" fill="none" stroke="#1f2937" stroke-width="2"/>
    <!-- Left cap -->
    <line x1="-140" y1="0" x2="-100" y2="0" stroke="#1f2937" stroke-width="2"/>
    <!-- Right cap -->
    <line x1="100" y1="0" x2="140" y2="0" stroke="#1f2937" stroke-width="2"/>

    <!-- Divider at 40% mark (rotate -18deg from top = 72deg from left) -->
    <line x1="0" y1="0" x2="-37.08" y2="-114.12" stroke="#1f2937" stroke-width="2.5" transform="scale(1.167)"/>

    <!-- Divider at 70% mark (rotate 36deg from top = 126deg from left) -->
    <line x1="0" y1="0" x2="70.53" y2="-97.08" stroke="#1f2937" stroke-width="2.5" transform="scale(1.167)"/>

    <!-- Labels -->
    <text x="-85" y="-75" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2937" font-family="monospace">niche</text>
    <text x="10" y="-110" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2937" font-family="monospace">normal</text>
    <text x="95" y="-65" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2937" font-family="monospace">mainstream</text>

    <!-- Base bar -->
    <rect x="-140" y="-2" width="280" height="16" fill="#4b5563" stroke="#1f2937" stroke-width="3"/>

    <!-- Needle at 35%: rotation = (35/100)*180 - 90 = -27deg -->
    <g transform="rotate(-27)">
      <polygon points="-5,0 5,0 0,-90" fill="#e5e7eb" stroke="#1f2937" stroke-width="2" stroke-linejoin="round"/>
    </g>

    <!-- Pivot point -->
    <circle cx="0" cy="0" r="12" fill="#e5e7eb" stroke="#1f2937" stroke-width="2"/>
    <circle cx="0" cy="0" r="7" fill="#1f2937"/>
  </g>

  <!-- Description text -->
  <text x="206" y="248" text-anchor="middle" font-size="18" fill="#1f2937" font-family="monospace">
    <tspan font-weight="bold">35%</tspan> of the books in your library are
  </text>
  <text x="206" y="270" text-anchor="middle" font-size="18" fill="#1f2937" font-family="monospace">
    considered "mainstream," based on author
  </text>
  <text x="206" y="292" text-anchor="middle" font-size="18" fill="#1f2937" font-family="monospace">
    and publisher popularity.
  </text>
</svg>
