{% if dna.reader_type %}
    <div class="bg-brand-purple border-brand-text shadow-neo border-2 p-4 text-center sm:p-6">
        {% if enrichment.genres_pending %}
            <p class="-mx-4 -mt-4 mb-3 animate-pulse bg-brand-yellow/50 py-1.5 text-center text-sm sm:-mx-6 sm:-mt-6 sm:mb-4">
                Still enriching — refresh for updates.
            </p>
        {% endif %}
        <div class="text-lg uppercase">{{ owner_pos|default:"Your" }} Reader Type is...</div>
        <div class="mt-1 text-5xl font-bold tracking-widest uppercase">{{ dna.reader_type }}</div>
        {% if dna.reader_type_explanation %}
            <p class="mx-auto mt-4 max-w-2xl text-lg">{{ dna.reader_type_explanation }}</p>
        {% endif %}
    </div>
{% endif %}
