{% if dna.reading_vibe %}
    {# djlint:off #}
    <div id="vibe-container"
         x-data="{
             allColors: ['#40e7aa', '#ffb4dd', '#ffa75e', '#8bbfff'],
             colors: [],
             init() {
                 let shuffled = [...this.allColors].sort(() => Math.random() - 0.5);
                 this.colors = shuffled.slice(0, 2);
             }
         }"
         class="mb-6 flex flex-wrap items-center justify-center gap-x-2 gap-y-2 text-center text-xl italic md:mb-8 md:gap-y-4">
        {% for phrase in dna.reading_vibe|slice:":2" %}
            {% if not forloop.first %}
                <span class="vibe-separator font-bold text-blue-400 mx-1">·</span>
            {% endif %}
            <span class="vibe-item whitespace-nowrap px-2 py-0 text-gray-700 mb-1 mt-1"
                  :style="'background-color:' + colors[{{ forloop.counter0 }}]">{{ phrase }}</span>
        {% endfor %}
    </div>
    {# djlint:on #}
{% endif %}
