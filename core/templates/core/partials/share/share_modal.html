<style>

    }
    @media (max-height: 740px) {
        .share-card-wrapper {
            transform: scale(0.85);
            margin-bottom: -85px;
        }
    }
    @media (max-height: 640px) {
        .share-card-wrapper {
            transform: scale(0.75);
            margin-bottom: -142px;
        }
    }
</style>

<script>
    var _cachedFontEmbedCSS = null;

    async function getEmbeddedFontCSS() {
        if (_cachedFontEmbedCSS) return _cachedFontEmbedCSS;

        try {
            const cssResponse = await fetch("https://fonts.googleapis.com/css2?family=VT323&display=swap");
            let css = await cssResponse.text();

            const urlRegex = /url\((https:\/\/fonts\.gstatic\.com[^)]+)\)/g;
            const matches = [...css.matchAll(urlRegex)];

            for (const match of matches) {
                const fontResponse = await fetch(match[1]);
                const fontBlob = await fontResponse.blob();
                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(fontBlob);
                });
                css = css.replace(match[0], `url(${base64})`);
            }

            _cachedFontEmbedCSS = css;
            return css;
        } catch (e) {
            console.error("Failed to embed font:", e);
            return null;
        }
    }

    function shareModalData() {
        return {
            shareModalOpen: false,
            shareButtonLabel: (navigator.canShare && navigator.canShare({ files: [new File([""], "t.png", { type: "image/png" })] })) ? "Share" : "Download",

            async shareImage(cardEl, filename) {
                if (typeof htmlToImage === "undefined") {
                    console.error("html-to-image not loaded");
                    return;
                }

                await document.fonts.ready;
                const fontEmbedCSS = await getEmbeddedFontCSS();

                try {
                    const options = { pixelRatio: 2 };
                    if (fontEmbedCSS) {
                        options.fontEmbedCSS = fontEmbedCSS;
                    }

                    const blob = await htmlToImage.toBlob(cardEl, options);

                    if (!blob) return;

                    const file = new File([blob], filename, { type: "image/png" });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: "My Bibliotype",
                                text: "Check out my reading DNA on Bibliotype!",
                            });
                            return;
                        } catch (e) {
                            if (e.name === "AbortError") return;
                        }
                    }

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = filename;
                    a.click();
                    setTimeout(() => URL.revokeObjectURL(url), 5000);
                } catch (e) {
                    console.error("Failed to generate share image:", e);
                }
            },
        };
    }
</script>
