<template x-teleport="body">
    <div
        x-show="shareModalOpen"
        x-cloak
        x-effect="document.body.classList.toggle('overflow-hidden', shareModalOpen)"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        @keydown.escape.window="shareModalOpen = false"
        @click.self="shareModalOpen = false"
        class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/80"
        style="height: 100dvh; height: 100vh;"
    >
        <div class="flex max-h-full w-full max-w-5xl flex-col items-center overflow-y-auto p-4" @click.self="shareModalOpen = false">
            <div class="mb-3 flex w-full shrink-0 items-center justify-between px-2">
                <h2 class="text-2xl font-bold tracking-wider uppercase text-white">Share Your Bibliotype</h2>
                <button
                    @click="shareModalOpen = false"
                    type="button"
                    class="border-2 border-brand-text bg-white px-3 py-1 text-lg font-bold transition-all hover:bg-brand-pink cursor-pointer"
                >
                    &times;
                </button>
            </div>

            <div class="flex w-full shrink-0 gap-6 overflow-x-auto pb-3 snap-x snap-mandatory scroll-px-4" style="-webkit-overflow-scrolling: touch;">
                <div class="snap-center shrink-0 flex flex-col items-center share-card-wrapper">
                    <div x-ref="cardIdentity">
                        {% include 'core/partials/share/card_identity.html' %}
                    </div>
                    <button
                        @click="shareImage($refs.cardIdentity, 'bibliotype-reader-type.png')"
                        type="button"
                        class="bg-brand-purple border-brand-text shadow-neo-sm mt-2 w-full cursor-pointer border-2 px-4 py-2 font-bold uppercase transition-all duration-150 ease-in-out hover:shadow-none active:translate-x-0.5 active:translate-y-0.5"
                    >
                        <span x-text="shareButtonLabel">Share</span>
                    </button>
                </div>

                <div class="snap-center shrink-0 flex flex-col items-center share-card-wrapper">
                    <div x-ref="cardStats">
                        {% include 'core/partials/share/card_stats.html' %}
                    </div>
                    <button
                        @click="shareImage($refs.cardStats, 'bibliotype-stats.png')"
                        type="button"
                        class="bg-brand-yellow border-brand-text shadow-neo-sm mt-2 w-full cursor-pointer border-2 px-4 py-2 font-bold uppercase transition-all duration-150 ease-in-out hover:shadow-none active:translate-x-0.5 active:translate-y-0.5"
                    >
                        <span x-text="shareButtonLabel">Share</span>
                    </button>
                </div>

                <div class="snap-center shrink-0 flex flex-col items-center share-card-wrapper">
                    <div x-ref="cardTaste">
                        {% include 'core/partials/share/card_taste.html' %}
                    </div>
                    <button
                        @click="shareImage($refs.cardTaste, 'bibliotype-taste.png')"
                        type="button"
                        class="bg-brand-green border-brand-text shadow-neo-sm mt-2 w-full cursor-pointer border-2 px-4 py-2 font-bold uppercase transition-all duration-150 ease-in-out hover:shadow-none active:translate-x-0.5 active:translate-y-0.5"
                    >
                        <span x-text="shareButtonLabel">Share</span>
                    </button>
                </div>

                <div class="snap-center shrink-0 flex flex-col items-center share-card-wrapper">
                    <div x-ref="cardMainstream">
                        {% include 'core/partials/share/card_mainstream.html' %}
                    </div>
                    <button
                        @click="shareImage($refs.cardMainstream, 'bibliotype-mainstream.png')"
                        type="button"
                        class="bg-brand-orange border-brand-text shadow-neo-sm mt-2 w-full cursor-pointer border-2 px-4 py-2 font-bold uppercase transition-all duration-150 ease-in-out hover:shadow-none active:translate-x-0.5 active:translate-y-0.5"
                    >
                        <span x-text="shareButtonLabel">Share</span>
                    </button>
                </div>

                <div class="snap-center shrink-0 flex flex-col items-center share-card-wrapper">
                    <div x-ref="cardFullSherbet">
                        {% include 'core/partials/share/card_full_sherbet.html' %}
                    </div>
                    <button
                        @click="shareImage($refs.cardFullSherbet, 'bibliotype-full.png')"
                        type="button"
                        class="bg-brand-pink border-brand-text shadow-neo-sm mt-2 w-full cursor-pointer border-2 px-4 py-2 font-bold uppercase transition-all duration-150 ease-in-out hover:shadow-none active:translate-x-0.5 active:translate-y-0.5"
                    >
                        <span x-text="shareButtonLabel">Share</span> — Sherbet
                    </button>
                </div>

                <div class="snap-center shrink-0 flex flex-col items-center share-card-wrapper">
                    <div x-ref="cardFullNeonPicnic">
                        {% include 'core/partials/share/card_full_neon_picnic.html' %}
                    </div>
                    <button
                        @click="shareImage($refs.cardFullNeonPicnic, 'bibliotype-full.png')"
                        type="button"
                        class="bg-brand-green border-brand-text shadow-neo-sm mt-2 w-full cursor-pointer border-2 px-4 py-2 font-bold uppercase transition-all duration-150 ease-in-out hover:shadow-none active:translate-x-0.5 active:translate-y-0.5"
                    >

                    </button>
                </div>

                <div class="snap-center shrink-0 flex flex-col items-center share-card-wrapper">
                    <div x-ref="cardFullMiami">
                        {% include 'core/partials/share/card_full_miami.html' %}
                    </div>
                    <button
                        @click="shareImage($refs.cardFullMiami, 'bibliotype-full.png')"
                        type="button"
                        class="bg-brand-orange border-brand-text shadow-neo-sm mt-2 w-full cursor-pointer border-2 px-4 py-2 font-bold uppercase transition-all duration-150 ease-in-out hover:shadow-none active:translate-x-0.5 active:translate-y-0.5"
                    >
                        <span x-text="shareButtonLabel">Share</span> — Miami Vice
                    </button>
                </div>
            </div>

            <p class="mt-1 shrink-0 text-center text-sm text-white/60">Swipe to see all cards</p>
        </div>
    </div>
</template>

<style>
    .share-card-wrapper {
        transform-origin: top center;
    }
    @media (max-height: 740px) {
        .share-card-wrapper {
            transform: scale(0.85);
            margin-bottom: -85px;
        }
    }
    @media (max-height: 640px) {
        .share-card-wrapper {
            transform: scale(0.75);
            margin-bottom: -142px;
        }
    }
</style>

<script>
    function shareModalData() {
        return {
            shareModalOpen: false,
            shareButtonLabel: (navigator.canShare && navigator.canShare({ files: [new File([""], "t.png", { type: "image/png" })] })) ? "Share" : "Download",

            async shareImage(cardEl, filename) {
                if (typeof htmlToImage === "undefined") {
                    console.error("html-to-image not loaded");
                    return;
                }

                await document.fonts.ready;

                try {
                    const blob = await htmlToImage.toBlob(cardEl, {
                        pixelRatio: 2,
                    });

                    if (!blob) return;

                    const file = new File([blob], filename, { type: "image/png" });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: "My Bibliotype",
                                text: "Check out my reading DNA on Bibliotype!",
                            });
                            return;
                        } catch (e) {
                            if (e.name === "AbortError") return;
                        }
                    }

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = filename;
                    a.click();
                    setTimeout(() => URL.revokeObjectURL(url), 5000);
                } catch (e) {
                    console.error("Failed to generate share image:", e);
                }
            },
        };
    }
</script>
